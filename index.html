                formData.append('image', fileOrBase64.split(',')[1]);
            } else {
                formData.append('image', fileOrBase64);
            }
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, { method: 'POST', body: formData });

                    return { success: true, url: data.data.url };
                } else {
                    return { success: false, error: data.error.message };

        const getStatus = (actual, standard, tol) => {
            if (actual === null || actual === '' || isNaN(actual)) return 'NONE';
            const diff = Math.abs(actual - standard);
            if (diff <= tol) return 'OK';
            if (diff <= tol * 1.5) return 'WARN';
            return 'NG';
        };

        const compressImage = (file, maxWidth = 1280, maxHeight = 1280, quality = 0.7) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth || height > maxHeight) {
                            if (width > height) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            } else {
                                width = Math.round((width * maxHeight) / height);
                                height = maxHeight;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            if (blob) {
                                const newFile = new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() });
                                resolve(newFile);
                            } else {
                                resolve(file);
                            }
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = () => resolve(file);
                };
                reader.onerror = () => resolve(file);
            });
        };

        // 智慧計算多邊形幾何重心
        const getPathCenter = (pathString) => {
            const coords = pathString.match(/[\d.]+/g).map(Number);
            let sumX = 0, sumY = 0;
            const count = coords.length / 2;
            for(let i=0; i<coords.length; i+=2) {
                sumX += coords[i];
                sumY += coords[i+1];
            }
            return { x: sumX / count, y: sumY / count };
        };

        const parsePath = (path) => {
            const coords = path.match(/[\d.]+/g).map(Number);
            const pts = [];
            for(let i=0; i<coords.length; i+=2) pts.push({x: coords[i], y: coords[i+1]});
            return pts;
        };

        const getSegments = (pts) => {
            const segs = [];
            for(let i=0; i<pts.length; i++) segs.push([pts[i], pts[(i+1)%pts.length]]);
            return segs;
        };

        // 全新演算法：利用向量外積與投影，找出任意角度的共線重疊線段（優化版：回傳所有重疊段）
        const getSharedSegments = (path1, path2) => {
            if (!path1 || !path2) return [];
            const segs1 = getSegments(parsePath(path1));
            const segs2 = getSegments(parsePath(path2));
            const TOL = 1.0; // 容差值，處理浮點數誤差

            const results = [];

            for(let s1 of segs1) {
                for(let s2 of segs2) {
                    const v1 = { x: s1[1].x - s1[0].x, y: s1[1].y - s1[0].y };
                    const v2 = { x: s2[1].x - s2[0].x, y: s2[1].y - s2[0].y };

                    // 1. 檢查是否平行 (外積趨近於0)
                    const cross1 = v1.x * v2.y - v1.y * v2.x;
                    if (Math.abs(cross1) > TOL) continue;

                    // 2. 檢查是否共線 (s2起點到s1的向量，與s1平行的外積趨近於0)
                    const v3 = { x: s2[0].x - s1[0].x, y: s2[0].y - s1[0].y };
                    const cross2 = v1.x * v3.y - v1.y * v3.x;
                    if (Math.abs(cross2) > TOL) continue;

                    // 3. 投影計算重疊區間
                    const len2 = v1.x * v1.x + v1.y * v1.y;
                    if (len2 === 0) continue;

                    const t1 = 0;
                    const t2 = 1;
                    const t3 = (v3.x * v1.x + v3.y * v1.y) / len2;
                    const t4 = ((s2[1].x - s1[0].x) * v1.x + (s2[1].y - s1[0].y) * v1.y) / len2;

                    const tStart = Math.max(Math.min(t1, t2), Math.min(t3, t4));
                    const tEnd = Math.min(Math.max(t1, t2), Math.max(t3, t4));

                    // 如果有實質重疊，記錄該線段
                    if (tEnd - tStart > 0.05) { 
                        results.push([
                            { x: s1[0].x + tStart * v1.x, y: s1[0].y + tStart * v1.y },
                            { x: s1[0].x + tEnd * v1.x, y: s1[0].y + tEnd * v1.y }
                        ]);
                    }
                }
            }
            return results;
        };

        // 點到任意角度線段的垂直投影
        const projectPointOnSegment = (p, A, B) => {
            const v = { x: B.x - A.x, y: B.y - A.y };
            const w = { x: p.x - A.x, y: p.y - A.y };
            const c1 = w.x * v.x + w.y * v.y;
            if (c1 <= 0) return A;
            const c2 = v.x * v.x + v.y * v.y;
            if (c2 <= c1) return B;
            const b = c1 / c2;
            return { x: A.x + b * v.x, y: A.y + b * v.y };
        };

        // ==========================================
        // 3. 子組件：首頁 (車型選擇與履歷)
        // ==========================================
        function HomePage({ models, setModels, onSelectModel, logs, addLog, openPrompt, openConfirm, setShowContactsModal, isConnected }) {

                                    <div className="flex justify-between items-start mb-4">

                    {/* 系統履歷 Modal */}
                    {showLogsModal && (
                        <div className="fixed inset-0 bg-[#000000]/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">

                                </div>

                                                    {log.time}
                                                </div>
                                                <div>
                                                    <h4 className="text-[14px] font-bold text-[#1d1d1f]">{log.action}</h4>

                        </div>

            );
        }

        const GridSvgViewer = React.memo(React.forwardRef(({
            selectedPart, currentPart2, showHeatmap, dotFilter, measurements, issues, 
            inputMode, currentExactPos, isDragging, setIsDragging, dragFlag,
            formData, setFormData, issueFormData, setIssueFormData,
            handlePartClick, handleBackgroundClick, handleEditRecord, handleDotMouseDown, handleDotTouchStart,
            getHeatmapColor, getDotColor,
            currentPaths, currentView, isDevMode, setDevCoordinates
        }, ref) => {
            const svgRef = React.useRef(null);
            const [viewBox, setViewBox] = React.useState({ x: 0, y: 0, w: 800, h: 620 });
            const panZoomState = React.useRef({ isPanning: false, startX: 0, startY: 0, startViewBox: null, initialPinchDistance: null });

            React.useImperativeHandle(ref, () => ({
                resetView: () => setViewBox({ x: 0, y: 0, w: 800, h: 620 })
            }));

            React.useEffect(() => {
                const svg = svgRef.current;
                if (!svg) return;
                const handleWheel = (e) => {
                    e.preventDefault();
                    setViewBox(prev => {
                        const zoomFactor = 0.05;
                        const delta = e.deltaY < 0 ? -1 : 1;
                        const svgRect = svg.getBoundingClientRect();
                        const mouseX = e.clientX - svgRect.left;
                        const mouseY = e.clientY - svgRect.top;
                        
                        const svgX = prev.x + (mouseX / svgRect.width) * prev.w;
                        const svgY = prev.y + (mouseY / svgRect.height) * prev.h;
                        
                        let newW = prev.w * (1 + delta * zoomFactor);
                        let newH = prev.h * (1 + delta * zoomFactor);
                        
                        if (newW < 200) { newW = 200; newH = 200 * (620/800); }
                        if (newW > 1600) { newW = 1600; newH = 1600 * (620/800); }
                        
                        let newX = svgX - (mouseX / svgRect.width) * newW;
                        let newY = svgY - (mouseY / svgRect.height) * newH;
                        
                        return { x: newX, y: newY, w: newW, h: newH };
                    });
                };
                svg.addEventListener('wheel', handleWheel, { passive: false });
                return () => svg.removeEventListener('wheel', handleWheel);
            }, []);

            const handleSvgMouseDown = (e) => {
                if (e.button === 1) {
                    e.preventDefault(); // Prevent default middle-click auto-scroll
                }
                if (!isDragging) {
                    panZoomState.current.isPanning = true;
                    panZoomState.current.startX = e.clientX;
                    panZoomState.current.startY = e.clientY;
                    panZoomState.current.startViewBox = viewBox;
                    
                    // Attach global listeners for reliable dragging
                    window.addEventListener('mousemove', handleWindowMouseMove);
                    window.addEventListener('mouseup', handleWindowMouseUp);
                }
            };
            
            const handleWindowMouseMove = (e) => {
                if (panZoomState.current.isPanning) {
                    const svg = svgRef.current;
                    if (!svg) return;
                    const rect = svg.getBoundingClientRect();
                    const clientX = e.clientX;
                    const clientY = e.clientY;
                    const dx = clientX - panZoomState.current.startX;
                    const dy = clientY - panZoomState.current.startY;
                    const scaleX = viewBox.w / rect.width;
                    const scaleY = viewBox.h / rect.height;
                    setViewBox({
                        ...viewBox,
                        x: panZoomState.current.startViewBox.x - dx * scaleX,
                        y: panZoomState.current.startViewBox.y - dy * scaleY
                    });
                    dragFlag.current = true;
                }
            };

            const handleWindowMouseUp = () => {
                if (panZoomState.current.isPanning) {
                    panZoomState.current.isPanning = false;
                    setTimeout(() => { dragFlag.current = false; }, 500);
                    window.removeEventListener('mousemove', handleWindowMouseMove);
                    window.removeEventListener('mouseup', handleWindowMouseUp);
                }
            };

            const handleSvgTouchStart = (e) => {
                if (e.touches.length === 2) {
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                    panZoomState.current.initialPinchDistance = dist;
                    panZoomState.current.startViewBox = viewBox;
                    panZoomState.current.isPanning = false;
                } else if (e.touches.length === 1 && !isDragging) {
                    panZoomState.current.isPanning = true;
                    panZoomState.current.startX = e.touches[0].clientX;
                    panZoomState.current.startY = e.touches[0].clientY;
                    panZoomState.current.startViewBox = viewBox;
                }
            };

            const handleSvgMouseMove = (e) => {
                if (panZoomState.current.isPanning) {
                    const svg = svgRef.current;
                    const rect = svg.getBoundingClientRect();
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    const dx = clientX - panZoomState.current.startX;
                    const dy = clientY - panZoomState.current.startY;
                    const scaleX = viewBox.w / rect.width;
                    const scaleY = viewBox.h / rect.height;
                    setViewBox({
                        ...viewBox,
                        x: panZoomState.current.startViewBox.x - dx * scaleX,
                        y: panZoomState.current.startViewBox.y - dy * scaleY
                    });
                    dragFlag.current = true;
                    return;
                }

                if (!isDragging || !svgRef.current || !selectedPart) return;
                dragFlag.current = true; 
                
                const p2 = inputMode === 'measure' ? formData.part2 : issueFormData.part2;
                if (!p2) return;

                const segs = getSharedSegments(currentPaths[selectedPart], currentPaths[p2]);
                if (segs.length === 0) return;

                const svg = svgRef.current;
                const rect = svg.getBoundingClientRect();
                const scaleX = viewBox.w / rect.width; 
                const scaleY = viewBox.h / rect.height;

                let clientX = e.clientX;
                let clientY = e.clientY;
                if (e.touches && e.touches.length > 0) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }

                const mouseP = {
                    x: viewBox.x + (clientX - rect.left) * scaleX,
                    y: viewBox.y + (clientY - rect.top) * scaleY
                };
                
                let closestP = null;
                let minDist = Infinity;
                
                for (let seg of segs) {
                    const p = projectPointOnSegment(mouseP, seg[0], seg[1]);
                    const d = (p.x - mouseP.x)**2 + (p.y - mouseP.y)**2;
                    if (d < minDist) {
                        minDist = d;
                        closestP = p;
                    }
                }

                if (closestP) {
                    if (inputMode === 'measure') setFormData(prev => ({...prev, exactPosition: closestP}));
                    else setIssueFormData(prev => ({...prev, exactPosition: closestP}));
                }
            };

            const handleSvgTouchMove = (e) => {
                if (e.touches.length === 2) {
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                    
                    if (panZoomState.current.initialPinchDistance) {
                        const scale = panZoomState.current.initialPinchDistance / dist;
                        const initialVB = panZoomState.current.startViewBox;
                        
                        let newW = initialVB.w * scale;
                        let newH = initialVB.h * scale;
                        
                        if (newW < 200) { newW = 200; newH = 200 * (620/800); }
                        if (newW > 1600) { newW = 1600; newH = 1600 * (620/800); }
                        
                        const clientX = (t1.clientX + t2.clientX) / 2;
                        const clientY = (t1.clientY + t2.clientY) / 2;
                        const svg = svgRef.current;
                        const rect = svg.getBoundingClientRect();
                        
                        const mouseX = clientX - rect.left;
                        const mouseY = clientY - rect.top;
                        
                        const svgX = initialVB.x + (mouseX / rect.width) * initialVB.w;
                        const svgY = initialVB.y + (mouseY / rect.height) * initialVB.h;
                        
                        let newX = svgX - (mouseX / rect.width) * newW;
                        let newY = svgY - (mouseY / rect.height) * newH;
                        
                        setViewBox({ x: newX, y: newY, w: newW, h: newH });
                    } else {
                        panZoomState.current.initialPinchDistance = dist;
                        panZoomState.current.startViewBox = viewBox;
                    }
                    return;
                } else {
                    panZoomState.current.initialPinchDistance = null;
                }
                handleSvgMouseMove(e);
            };

            const handleSvgMouseUp = () => {
                setIsDragging(false);
                panZoomState.current.isPanning = false;
                panZoomState.current.initialPinchDistance = null;
                setTimeout(() => { dragFlag.current = false; }, 500);
            };

            const handleSvgClick = (e) => {
                const svg = svgRef.current;
                if (!svg) return;
                
                // 更精準的座標轉換，處理 preserveAspectRatio 的縮放與留白
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                const mouseP = { x: Math.round(svgP.x), y: Math.round(svgP.y) };

                if (currentView !== '2d') {
                    if (isDevMode) {
                        setDevCoordinates(prev => [...prev, mouseP]);
                    } else {
                        handlePartClick(e, 'custom_point', mouseP);
                    }
                } else if (isDevMode) {
                    setDevCoordinates(prev => [...prev, mouseP]);
                }
            };

            return (
                <svg 
                    ref={svgRef}
                    viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`} 
                    className={`w-full h-full max-w-[800px] drop-shadow-sm select-none ${currentView === '2d' ? 'cursor-grab active:cursor-grabbing' : ''}`} 
                    style={{ 
                        touchAction: 'none',
                        cursor: currentView !== '2d' ? `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M12 2v20M2 12h20' stroke='%23ff3b30' stroke-width='2'/><circle cx='12' cy='12' r='8' fill='none' stroke='%23ffffff' stroke-width='1.5'/></svg>") 12 12, crosshair` : undefined
                    }}
                    onMouseDown={handleSvgMouseDown}
                    onMouseMove={handleSvgMouseMove}
                    onMouseUp={handleSvgMouseUp}
                    onMouseLeave={handleSvgMouseUp}
                    onTouchStart={handleSvgTouchStart}
                    onTouchMove={handleSvgTouchMove}
                    onTouchEnd={handleSvgMouseUp}
                    onTouchCancel={currentView === '2d' ? handleSvgMouseUp : undefined}
                    onClick={handleSvgClick}
                >

                const element = document.getElementById('pdf-report-template');
                
                try {
                    // 動態載入 html2canvas 與 jspdf
                    if (typeof window.html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
                        await Promise.all([
                            new Promise((resolve, reject) => {
                                const script = document.createElement('script');
                                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                                script.onload = resolve;
                                script.onerror = () => reject(new Error('無法從 CDN 載入 html2canvas'));
                                document.head.appendChild(script);
                            }),
                            new Promise((resolve, reject) => {
                                const script = document.createElement('script');
                                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                                script.onload = resolve;
                                script.onerror = () => reject(new Error('無法從 CDN 載入 jspdf'));
                                document.head.appendChild(script);
                            })
                        ]);
                    }

                    if (element && window.html2canvas && window.jspdf) {
                        element.style.display = 'block';
                        element.style.top = '0px';
                        element.style.left = '0px';
                        element.style.zIndex = '-1';
                        
                        // 等待一下讓 DOM 確實繪製
                        await new Promise(r => setTimeout(r, 150));

                        // 分頁防裁切邏輯
                        const pdfWidth_mm = 297;
                        const margin_mm = 10;
                        const printWidth_mm = pdfWidth_mm - margin_mm * 2;
                        const printHeight_mm = 210 - margin_mm * 2;
                        const pxPerMm = 1120 / printWidth_mm;
                        const pageHeightPx = printHeight_mm * pxPerMm;

                        const rows = Array.from(element.querySelectorAll('tr'));
                        for (let row of rows) {
                            const rect = row.getBoundingClientRect();
                            const elementRect = element.getBoundingClientRect();
                            const top = rect.top - elementRect.top;
                            const bottom = top + rect.height;
                            
                            const pageTop = Math.floor(top / pageHeightPx);
                            const pageBottom = Math.floor((bottom - 1) / pageHeightPx);
                            
                            if (pageBottom > pageTop && rect.height < pageHeightPx) {
                                const nextPageTop = (pageTop + 1) * pageHeightPx;
                                const pushAmount = nextPageTop - top;
                                
                                const spacer = document.createElement('tr');
                                spacer.className = 'pdf-spacer';
                                spacer.style.height = `${pushAmount}px`;
                                const td = document.createElement('td');
                                td.colSpan = 10;
                                td.style.border = 'none';
                                spacer.appendChild(td);
                                row.parentNode.insertBefore(spacer, row);
                            }
                        }

                        // 再次等待 DOM 更新
                        await new Promise(r => setTimeout(r, 100));

                        const canvas = await window.html2canvas(element, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff'
                        });

                        // 清除防裁切空白列
                        const spacers = element.querySelectorAll('.pdf-spacer');
                        spacers.forEach(s => s.remove());

                        element.style.display = 'none';

                        const imgData = canvas.toDataURL('image/jpeg', 0.98);
                        const pdf = new window.jspdf.jsPDF('l', 'mm', 'a4');
                        const pdfWidth = 297;
                        const pdfHeight = 210;
                        const margin = 10;
                        const printWidth = pdfWidth - margin * 2;
                        const printHeight = (canvas.height * printWidth) / canvas.width;
                        const pageHeight = pdfHeight - margin * 2;

                        let heightLeft = printHeight;
                        let position = 0;

                        // 第一頁
                        pdf.addImage(imgData, 'JPEG', margin, margin, printWidth, printHeight);
                        pdf.setFillColor(255, 255, 255);
                        pdf.rect(0, 0, pdfWidth, margin, 'F'); // 遮蓋上邊界
                        pdf.rect(0, pdfHeight - margin, pdfWidth, margin, 'F'); // 遮蓋下邊界
                        heightLeft -= pageHeight;

                        // 之後的頁面
                        while (heightLeft > 0) {
                            position -= pageHeight;
                            pdf.addPage();
                            pdf.addImage(imgData, 'JPEG', margin, margin + position, printWidth, printHeight);
                            pdf.setFillColor(255, 255, 255);
                            pdf.rect(0, 0, pdfWidth, margin, 'F');
                            pdf.rect(0, pdfHeight - margin, pdfWidth, margin, 'F');
                            heightLeft -= pageHeight;
                        }

                        pdf.save(`${currentModel.name}_建付分析報告_${new Date().toISOString().split('T')[0]}.pdf`);
                        
                        addLog('匯出報表', `匯出了 ${currentModel.name} 的 PDF 報告`);
                    } else {
                        throw new Error('找不到報表模板或模組載入異常');
                    }
                } catch (e) {
                    showToast('PDF 匯出失敗: ' + (e.message || '未知錯誤'), 'error');

        // ==========================================
        // 5. 子組件：照片標註 Modal
        // ==========================================
        function AnnotationModal({ annotatingPhoto, setAnnotatingPhoto }) {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [isUploading, setIsUploading] = useState(false);
            const ctxRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.crossOrigin = "Anonymous"; // 避免跨域污染畫布
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    ctx.strokeStyle = '#ff3b30';
                    ctx.lineWidth = 5;
                    ctx.lineCap = 'round';
                    ctxRef.current = ctx;
                };
                img.src = annotatingPhoto.url;
            }, [annotatingPhoto.url]);

            const startDraw = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                ctxRef.current.beginPath();
                ctxRef.current.moveTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                ctxRef.current.lineTo((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
                ctxRef.current.stroke();
            };

            const stopDraw = () => {
                if(isDrawing) {
                    ctxRef.current.closePath();
                    setIsDrawing(false);
                }
            };

            const handleSave = async () => {
                const apiKey = await annotatingPhoto.getImgBBKeyAsync();
                if (!apiKey) return;

                setIsUploading(true);
                const base64 = canvasRef.current.toDataURL('image/jpeg', 0.8);
                const result = await uploadImageToImgBB(base64, apiKey);
                
                if (result.success) {
                    annotatingPhoto.onSave(result.url);
                    setAnnotatingPhoto(null);
                } else {
                    alert(`標註儲存失敗: ${result.error}`);
                    if (result.error && result.error.toLowerCase().includes('key')) {
                        localStorage.removeItem('imgbb_api_key');
                    }
                }
                setIsUploading(false);
            };

            return (
                <div className="fixed inset-0 bg-[#000000]/90 backdrop-blur-xl z-[110] flex flex-col items-center justify-center p-4 animate-fade-in">
                    <div className="absolute top-6 left-6 right-6 flex justify-between items-center z-10">
                        <div className="text-white font-semibold flex items-center gap-2"><Icons.Brush size={20}/> 標註照片</div>
                        <div className="flex gap-3">
                            <button onClick={() => setAnnotatingPhoto(null)} disabled={isUploading} className="px-4 py-2 bg-white/20 hover:bg-white/30 text-white rounded-full transition-colors text-[14px] font-semibold backdrop-blur-md disabled:opacity-50">取消</button>
                            <button onClick={handleSave} disabled={isUploading} className="px-4 py-2 bg-[#0071e3] hover:bg-[#0077ed] text-white rounded-full transition-colors text-[14px] font-semibold shadow-lg disabled:opacity-50">
                                {isUploading ? '上傳雲端中...' : '儲存標註'}
                            </button>
                        </div>
                    </div>
                    <div className="relative max-w-full max-h-[80vh] overflow-hidden rounded-lg shadow-2xl bg-black">
                        <canvas 
                            ref={canvasRef}
                            onMouseDown={startDraw}
                            onMouseMove={draw}
                            onMouseUp={stopDraw}
                            onMouseLeave={stopDraw}
                            className="max-w-full max-h-[80vh] object-contain cursor-crosshair touch-none"
                        />
                    </div>
                    <p className="text-white/60 text-[13px] mt-4">請使用滑鼠在照片上畫出瑕疵位置</p>
                </div>
            );
        }

                    setIsDBLoaded(true);
                });

                db.ref('contacts').on('value', snap => {

                    else {
                        const def = [
                            { id: 'c1', name: '王大明', dept: '車體設計課', title: '高級工程師', ext: '3101', phone: '0912-345-678' },
                            { id: 'c2', name: '李小華', dept: '外裝開發課', title: '專案經理', ext: '3205', phone: '0922-111-222' }
                        ];
                        db.ref('contacts').set(def).catch(e => { console.error('Firebase Set Error:', e); if(typeof setToastMsg === 'function') setToastMsg({type: 'error', text: '資料庫寫入異常，請檢查網路連線'}); });
                    }
                });

            // 獨立監聽工單資料 (支援分頁)
            useEffect(() => {
                const woRef = db.ref('workOrders').limitToFirst(woLimit);
                const listener = woRef.on('value', snap => {
                    if (snap.exists()) {
                        const data = snap.val();
                        let parsedData = Array.isArray(data) ? data : Object.values(data);

                        setWorkOrdersState(parsedData);
                        setHasMoreWOs(parsedData.length >= woLimit);
                    } else {
                        setWorkOrdersState([]);
                        setHasMoreWOs(false);

                return () => woRef.off('value', listener);
            }, [woLimit]);

            const loadMoreWOs = () => setWoLimit(prev => prev + 20);

            // 寫入 Firebase 的包裝函數
            const setModels = (newModels) => db.ref('models').set(newModels).catch(e => { console.error('Firebase Set Error:', e); if(typeof setToastMsg === 'function') setToastMsg({type: 'error', text: '資料庫寫入異常，請檢查網路連線'}); });
            
            const addLog = (action, details) => {
                const newLog = { id: Date.now().toString(), time: new Date().toLocaleString(), action, details };
                db.ref('logs').once('value').then(snap => {
                    const currentLogs = snap.exists() ? snap.val() : [];

                });
            };

                db.ref('models').once('value').then(snap => {
                    const currentModels = snap.exists() ? snap.val() : [];

                    db.ref('models').set(newModels).catch(e => { console.error('Firebase Set Error:', e); if(typeof setToastMsg === 'function') setToastMsg({type: 'error', text: '資料庫寫入異常，請檢查網路連線'}); });
                });

            // 安全的工單寫入邏輯 (避免分頁導致資料覆蓋)
            const createWorkOrder = (newWO) => {
                setWorkOrdersState(prev => {
                    const existingIndex = prev.findIndex(wo => wo.id === newWO.id);

                        const updated = [...prev];
                        updated[existingIndex] = newWO;
                        return updated;
                    } else {
                        return [newWO, ...prev].slice(0, woLimit);
                    }
                });

                db.ref('workOrders').once('value').then(snap => {
                    const currentWOs = snap.exists() ? snap.val() : [];
                    let parsed = Array.isArray(currentWOs) ? currentWOs : Object.values(currentWOs);
                    parsed = parsed.filter(wo => wo !== null);
                    const existingIndex = parsed.findIndex(wo => wo.id === newWO.id);

                        parsed[existingIndex] = newWO;

            const closeDialog = () => setDialog({ ...dialog, isOpen: false });

            const handleSelectModel = (model) => {
                setActiveModelId(model.id);
                setView('workspace');
            };

            // 載入畫面
            if (!isDBLoaded) {
                return (
                    <div className="min-h-screen bg-[#f5f5f7] flex flex-col items-center justify-center">
                        <div className="animate-spin rounded-full h-12 w-12 border-4 border-[#0071e3] border-t-transparent mb-4"></div>
                        <p className="text-[#86868b] font-medium animate-pulse">連線至 Firebase 雲端資料庫...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f5f5f7]">
                    {view === 'home' ? (
                        <HomePage models={models} setModels={setModels} onSelectModel={handleSelectModel} logs={logs} addLog={addLog} openPrompt={openPrompt} openConfirm={openConfirm} setShowContactsModal={setShowContactsModal} isConnected={isConnected} />
                    ) : (
                        <Workspace 
                            currentModel={activeModel} 
                            updateModel={updateModel} 
                            workOrders={workOrders} 
                            createWorkOrder={createWorkOrder}
                            editWorkOrder={editWorkOrder}
                            deleteWorkOrder={deleteWorkOrder}
                            hasMoreWOs={hasMoreWOs}
                            loadMoreWOs={loadMoreWOs}
                            logs={logs} 
                            addLog={addLog} 
                            onBack={() => setView('home')} 
                            openPrompt={openPrompt} 
                            openConfirm={openConfirm} 
                            setViewingPhoto={setViewingPhoto} 
                            setShowContactsModal={setShowContactsModal} 
                            contacts={contacts} 
                            setAnnotatingPhoto={setAnnotatingPhoto} 
                            isMobile={isMobile}
                            mobileActiveTab={mobileActiveTab}
                            setMobileActiveTab={setMobileActiveTab}
                            isBottomSheetOpen={isBottomSheetOpen}
                            setIsBottomSheetOpen={setIsBottomSheetOpen}
                            isMobileMenuOpen={isMobileMenuOpen}
                            setIsMobileMenuOpen={setIsMobileMenuOpen}
                            setGlobalLoading={setGlobalLoading}
                            isConnected={isConnected}
                        />
                    )}

                    {/* 全域 Loading 遮罩層 */}
                    {globalLoading && (
                        <div className="fixed inset-0 bg-[#1d1d1f]/40 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center animate-fade-in">
                            <div className="bg-white px-8 py-6 rounded-2xl shadow-2xl flex flex-col items-center gap-4 animate-scale-up">
                                <div className="animate-spin rounded-full h-10 w-10 border-4 border-[#0071e3] border-t-transparent"></div>
                                <p className="text-[#1d1d1f] font-semibold text-[15px]">處理中，請稍候...</p>
                            </div>
                        </div>
                    )}

                        {/* Modal 與 Dialog 區塊 */}
                        {dialog.isOpen && (
                        <div className="fixed inset-0 bg-[#000000]/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-[20px] shadow-[0_20px_40px_rgba(0,0,0,0.2)] w-full max-w-sm overflow-hidden flex flex-col animate-zoom-in text-center p-6">
                                <h3 className="font-bold text-[18px] text-[#1d1d1f] mb-2">{dialog.title}</h3>
                                <p className="text-[14px] text-[#86868b] mb-6">{dialog.message}</p>
                                
                                {dialog.type === 'prompt' && (
                                    <input 
                                        type="text" 
                                        autoFocus
                                        className="w-full bg-[#f5f5f7] border border-gray-200 focus:border-[#0071e3] focus:ring-4 focus:ring-[#0071e3]/20 rounded-xl p-3 text-[15px] outline-none transition-all mb-6 text-center"
                                        defaultValue={dialog.defaultValue}
                                        onKeyDown={(e) => { if(e.key === 'Enter') { dialog.onConfirm(e.target.value); closeDialog(); } }}
                                        id="promptInput"
                                    />
                                )}

                                <div className="flex gap-3">
                                    <button onClick={closeDialog} className="flex-1 py-3 text-[15px] font-semibold text-[#1d1d1f] bg-[#f5f5f7] hover:bg-[#e8e8ed] rounded-xl transition-colors">取消</button>
                                    <button 
                                        onClick={() => {
                                            if (dialog.type === 'prompt') dialog.onConfirm(document.getElementById('promptInput').value);
                                            else dialog.onConfirm();
                                            closeDialog();
                                        }} 
                                        className={`flex-1 py-3 text-[15px] font-semibold text-white rounded-xl transition-colors ${dialog.type === 'confirm' && dialog.title.includes('刪除') ? 'bg-[#ff3b30] hover:bg-[#d70015]' : 'bg-[#0071e3] hover:bg-[#0077ed]'}`}
                                    >
                                        確定
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 全域 聯絡人清單 Modal (可編輯) */}
                    {showContactsModal && (
                        <div className="fixed inset-0 bg-[#000000]/40 backdrop-blur-sm z-[90] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-[24px] shadow-[0_20px_40px_rgba(0,0,0,0.2)] w-full max-w-3xl overflow-hidden flex flex-col animate-zoom-in">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white/80 backdrop-blur-md">
                                    <h3 className="font-semibold text-[16px] text-[#1d1d1f] flex items-center gap-2"><Icons.Users size={18} className="text-[#0071e3]"/> 聯絡人管理</h3>
                                    <button onClick={() => setShowContactsModal(false)} className="p-1.5 bg-[#f5f5f7] hover:bg-[#e8e8ed] text-[#86868b] rounded-full transition-colors"><Icons.X size={18}/></button>
                                </div>
                                
                                <div className="p-5 bg-white border-b border-gray-100">
                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className="text-[13px] font-bold text-[#86868b]">{editingContactId ? '編輯聯絡人' : '新增聯絡人'}</h4>
                                        {editingContactId && (
                                            <button onClick={handleCancelEdit} className="text-[12px] font-semibold text-[#86868b] hover:text-[#1d1d1f] transition-colors">取消編輯</button>
                                        )}
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3">
                                        <input type="text" placeholder="姓名*" className="bg-[#f5f5f7] rounded-xl p-2.5 text-[13px] outline-none focus:ring-2 focus:ring-[#0071e3]/20" value={newContact.name} onChange={e => setNewContact({...newContact, name: e.target.value})} />
                                        <input type="text" placeholder="單位*" className="bg-[#f5f5f7] rounded-xl p-2.5 text-[13px] outline-none focus:ring-2 focus:ring-[#0071e3]/20" value={newContact.dept} onChange={e => setNewContact({...newContact, dept: e.target.value})} />
                                        <input type="text" placeholder="職稱" className="bg-[#f5f5f7] rounded-xl p-2.5 text-[13px] outline-none focus:ring-2 focus:ring-[#0071e3]/20" value={newContact.title} onChange={e => setNewContact({...newContact, title: e.target.value})} />
                                        <input type="text" placeholder="分機" className="bg-[#f5f5f7] rounded-xl p-2.5 text-[13px] outline-none focus:ring-2 focus:ring-[#0071e3]/20" value={newContact.ext} onChange={e => setNewContact({...newContact, ext: e.target.value})} />
                                        <input type="text" placeholder="備註" className="bg-[#f5f5f7] rounded-xl p-2.5 text-[13px] outline-none focus:ring-2 focus:ring-[#0071e3]/20" value={newContact.notes || ''} onChange={e => setNewContact({...newContact, notes: e.target.value})} />
                                        <button onClick={handleAddContact} disabled={!newContact.name || !newContact.dept} className={`rounded-xl text-[13px] font-semibold transition-colors text-white disabled:bg-[#d2d2d7] ${editingContactId ? 'bg-[#34c759] hover:bg-[#2fb350]' : 'bg-[#0071e3] hover:bg-[#0077ed]'}`}>
                                            {editingContactId ? '更新' : '新增'}
                                        </button>
                                    </div>
                                </div>

                                <div className="p-6 bg-[#fbfbfd] max-h-[50vh] overflow-y-auto">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {contacts.map(contact => (
                                            <div key={contact.id} className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col gap-2 hover:border-[#0071e3] transition-colors group relative">
                                                <div className="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                                    <button onClick={() => handleEditContact(contact)} className="p-1.5 text-[#86868b] hover:text-[#0071e3] hover:bg-[#0071e3]/10 rounded-lg transition-colors">
                                                        <Icons.Edit2 size={16} />
                                                    </button>
                                                    <button onClick={() => handleDeleteContact(contact.id, contact.name)} className="p-1.5 text-[#86868b] hover:text-[#ff3b30] hover:bg-[#ff3b30]/10 rounded-lg transition-colors">
                                                        <Icons.Trash2 size={16} />
                                                    </button>
                                                </div>
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <h4 className="font-bold text-[#1d1d1f] text-[15px]">{contact.name}</h4>
                                                        <span className="text-[12px] font-medium text-[#86868b]">{contact.dept} · {contact.title}</span>
                                                    </div>
                                                </div>
                                                <div className="mt-2 pt-2 border-t border-gray-50 flex flex-col gap-1 text-[13px] text-[#1d1d1f]">
                                                    <div className="flex justify-between">
                                                        <span className="text-[#86868b]">分機</span>
                                                        <span className="font-mono font-medium">{contact.ext || '-'}</span>
                                                    </div>
                                                    <div className="flex justify-between">
                                                        <span className="text-[#86868b]">手機</span>
                                                        <span className="font-mono font-medium">{contact.phone || '-'}</span>
                                                    </div>
                                                    {contact.notes && (
                                                        <div className="flex justify-between mt-1 pt-1 border-t border-gray-50/50">
                                                            <span className="text-[#86868b]">備註</span>
                                                            <span className="font-medium text-right max-w-[60%] truncate" title={contact.notes}>{contact.notes}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 全域 照片放大檢視器 */}
                    {viewingPhoto && (
                        <div className="fixed inset-0 bg-[#000000]/90 backdrop-blur-xl z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={() => setViewingPhoto(null)}>
                            <button onClick={() => setViewingPhoto(null)} className="absolute top-6 right-6 p-2 bg-white/20 hover:bg-white/30 text-white rounded-full transition-colors backdrop-blur-md">
                                <Icons.X size={24}/>
                            </button>
                            <img src={viewingPhoto} alt="Enlarged" className="max-w-full max-h-full object-contain rounded-lg shadow-2xl animate-zoom-in" onClick={(e) => e.stopPropagation()} />
                        </div>
                    )}

                    {/* 全域 照片標註器 */}
                    {annotatingPhoto && (
                        <AnnotationModal annotatingPhoto={annotatingPhoto} setAnnotatingPhoto={setAnnotatingPhoto} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
